<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Elucida Assurance">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B4A"/><stop offset="0.5" stop-color="#FFC24B"/><stop offset="1" stop-color="#4FE0FF"/>
    </linearGradient>
    <filter id="agl" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .halo{transform-origin:50px 50px;animation:halo 3.4s ease-in-out infinite}
      @keyframes halo{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.46;transform:scale(1.1)}}
      .mark{transform-origin:50px 50px;animation:breathe 5s ease-in-out infinite}
      @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
      .draw{stroke-dasharray:240;animation:draw 1.4s cubic-bezier(.2,.8,.2,1) forwards}
      @keyframes draw{from{stroke-dashoffset:240}to{stroke-dashoffset:0}}
      .fillfade{animation:ff 1.2s ease forwards;animation-delay:.5s;opacity:0}
      @keyframes ff{to{opacity:1}}
      .core{animation:core 3.4s ease-in-out infinite}
      @keyframes core{0%,100%{opacity:.85}50%{opacity:1}}
    </style>
  </defs>
  <circle class="halo" cx="50" cy="50" r="30" fill="url(#ag)" opacity="0.24"/>
  <g stroke="url(#ag)" stroke-width="2.4" stroke-linecap="round" opacity=".5">
    <line x1="50" y1="2" x2="50" y2="12"/><line x1="50" y1="88" x2="50" y2="98"/>
    <line x1="2" y1="50" x2="12" y2="50"/><line x1="88" y1="50" x2="98" y2="50"/>
  </g>
  <g class="mark" filter="url(#agl)">
    <path class="draw" d="M50 8 L92 50 L50 92 L8 50 Z" fill="none" stroke="url(#ag)" stroke-width="3" stroke-linejoin="round"/>
    <path class="fillfade" d="M50 30 L70 50 L50 70 L30 50 Z" fill="url(#ag)"/>
  </g>
  <circle class="core" cx="50" cy="50" r="5" fill="#FFF1D6" filter="url(#agl)"/>
  <g filter="url(#agl)" fill="#ffe6b0">
    <circle r="2.6"><animateMotion dur="4.6s" repeatCount="indefinite" path="M50 8 L92 50 L50 92 L8 50 Z"/></circle>
    <circle r="1.7"><animateMotion dur="4.6s" begin="-2.3s" repeatCount="indefinite" path="M50 8 L92 50 L50 92 L8 50 Z"/></circle>
  </g>
</svg>
